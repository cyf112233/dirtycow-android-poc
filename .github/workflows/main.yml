name: Build DirtyCow for Android with NDK r15c

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Android NDK r15c
        run: |
          # 下载 NDK r15c (Linux 64-bit)
          wget https://dl.google.com/android/repository/android-ndk-r15c-linux-x86_64.zip
          unzip -q android-ndk-r15c-linux-x86_64.zip
          echo "${{ github.workspace }}/android-ndk-r15c" >> $GITHUB_PATH

      - name: Build dirtycow and run-as binaries
        run: |
          # 直接调用 ndk-build，绕过原 Makefile 中的 adb 依赖
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./Android.mk \
            APP_ABI=all \
            APP_PLATFORM=android-21

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: dirtycow-binaries-ndk-r15c
          path: |
            libs/**/dirtycow
            libs/**/run-as
